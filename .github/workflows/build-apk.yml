name: Build WonderWorld APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Extract Android project
        run: unzip -o wonderworld_android_app_source.zip

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.9"

      - name: Build APK
        run: |
          cd wonderworld_android_app
          gradle assembleDebug

      - name: Collect APK
        run: |
          mkdir -p collected-apk
          cp wonderworld_android_app/app/build/outputs/apk/debug/app-debug.apk collected-apk/WonderWorld-Guest-App.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WonderWorld-Guest-App-APK
          path: collected-apk/WonderWorld-Guest-App.apk
