name: Build WonderWorld Mobile Deluxe APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Extract mobile deluxe Android project
        run: |
          rm -rf wonderworld_android_app_mobile_deluxe
          unzip -o wonderworld_android_app_mobile_deluxe_source.zip
          echo "Project extracted"
          find . -maxdepth 3 -type f | sort | head -200

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        working-directory: wonderworld_android_app_mobile_deluxe
        run: |
          gradle --no-daemon assembleDebug

      - name: Find built APK
        id: find_apk
        run: |
          APK_PATH=$(find wonderworld_android_app_mobile_deluxe \
            -type f \
            -path "*/build/outputs/apk/debug/*.apk" \
            | head -1)

          if [ -z "$APK_PATH" ]; then
            echo "No debug APK was found."
            find wonderworld_android_app_mobile_deluxe -type f -name "*.apk"
            exit 1
          fi

          echo "APK found at: $APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Prepare APK download
        run: |
          mkdir -p collected-apk
          cp \
            "${{ steps.find_apk.outputs.apk_path }}" \
            collected-apk/WonderWorld-Guest-App-Mobile-Deluxe.apk

      - name: Upload WonderWorld mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: WonderWorld-Mobile-Deluxe-APK
          path: collected-apk/WonderWorld-Guest-App-Mobile-Deluxe.apk
          if-no-files-found: error
          retention-days: 30
